version: '3.8'

services:
  subscriber:
    build: .
    container_name: prism_subscriber
    restart: unless-stopped
    command: python subscriber.py
    volumes:
      - /opt/prism-insight-data:/app

  dashboard:
    build: .
    container_name: prism_dashboard
    restart: unless-stopped
    command: python dashboard.py
    ports:
      - "8000:8000"
    volumes:
      - /opt/prism-insight-data:/app
