{% extends "base.html" %}
{% block title %}Logs - PRISM WebUI{% endblock %}
{% block content %}
<section class="card">
  <h2>Logs: {{ log.name }}</h2>
  {% if log.error %}<p class="error">{{ log.error }}</p>{% endif %}
  <pre>{% for line in log.lines %}{{ line }}
{% endfor %}</pre>
</section>
{% endblock %}
