name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    name: Full pytest suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run static smoke checks
        run: |
          python -m compileall -q subscriber.py pubsub_readiness.py trading webui tests
          bash -n install_prism_docker.sh setup_subscriber_crontab.sh setup_subscriber_docker_crontab.sh

      - name: Run all tests
        run: python -m pytest -q

      - name: Build runtime image
        run: docker build --tag prism-insight-light:test .
